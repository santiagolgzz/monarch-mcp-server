name: CD

on:
  push:
    branches: [main]
  workflow_dispatch: # Manual trigger option

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    # Only run if GCP is configured (skips gracefully for forks without secrets)
    if: vars.GCP_PROJECT_ID != ''

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION || 'us-central1' }}-docker.pkg.dev

      - name: Build and Push Docker Image
        run: |
          IMAGE="${{ vars.GCP_REGION || 'us-central1' }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/monarch-mcp/server:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy to Cloud Run
        id: deploy
        env:
          OAUTH_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
          OAUTH_REDIS_URL: ${{ secrets.OAUTH_REDIS_URL }}
          OAUTH_JWT_SIGNING_KEY: ${{ secrets.OAUTH_JWT_SIGNING_KEY }}
          MCP_CI_SMOKE_TOKEN: ${{ secrets.MCP_CI_SMOKE_TOKEN }}
        run: |
          gcloud run deploy monarch-mcp \
            --image ${{ vars.GCP_REGION || 'us-central1' }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/monarch-mcp/server:${{ github.sha }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --platform managed \
            --region ${{ vars.GCP_REGION || 'us-central1' }} \
            --allow-unauthenticated \
            --vpc-connector "${{ vars.GCP_VPC_CONNECTOR || 'monarch-mcp-connector' }}" \
            --vpc-egress private-ranges-only \
            --set-env-vars "MCP_AUTH_MODE=oauth" \
            --set-env-vars "GITHUB_CLIENT_ID=${{ vars.OAUTH_CLIENT_ID }}" \
            --set-env-vars "GITHUB_CLIENT_SECRET=${OAUTH_SECRET}" \
            --set-env-vars "MCP_OAUTH_REDIS_URL=${OAUTH_REDIS_URL}" \
            --set-env-vars "MCP_OAUTH_JWT_SIGNING_KEY=${OAUTH_JWT_SIGNING_KEY}" \
            --set-env-vars "MCP_ENABLE_CI_SMOKE=true" \
            --set-env-vars "MCP_CI_SMOKE_TOKEN=${MCP_CI_SMOKE_TOKEN}" \
            --set-env-vars "BASE_URL=${{ vars.CLOUD_RUN_URL }}" \
            --set-secrets "MONARCH_EMAIL=monarch-email:latest,MONARCH_PASSWORD=monarch-password:latest,MONARCH_MFA_SECRET=monarch-mfa-secret:latest"

      - name: Verify Deployment
        run: |
          echo "Checking liveness endpoint..."
          sleep 10  # Give service time to start
          curl -sf "${{ vars.CLOUD_RUN_URL }}/health" || echo "Liveness check pending (service may need a moment to start)"
          echo "Checking readiness endpoint..."
          curl -sf "${{ vars.CLOUD_RUN_URL }}/ready" || (echo "Readiness check failed" && exit 1)

      - name: Smoke MCP Tool Call (required)
        env:
          MCP_CI_SMOKE_TOKEN: ${{ secrets.MCP_CI_SMOKE_TOKEN }}
        run: |
          set -euo pipefail
          BASE_URL="${{ vars.CLOUD_RUN_URL }}"
          MCP_URL="${BASE_URL}/mcp-smoke/mcp"

          init_headers=$(mktemp)
          init_body=$(mktemp)
          curl -sS -D "$init_headers" -o "$init_body" \
            -H "Authorization: Bearer ${MCP_CI_SMOKE_TOKEN}" \
            -H 'content-type: application/json' \
            -H 'accept: application/json, text/event-stream' \
            --data '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-03-26","capabilities":{},"clientInfo":{"name":"cd-smoke","version":"1.0.0"}}}' \
            "$MCP_URL"

          extract_payload() {
            local file="$1"
            python3 - "$file" <<'PY'
import sys
from pathlib import Path

raw = Path(sys.argv[1]).read_text().strip()
if raw.startswith("event:"):
    data_lines = [line.removeprefix("data: ").strip() for line in raw.splitlines() if line.startswith("data: ")]
    if not data_lines:
        raise SystemExit("No SSE data payload found")
    print(data_lines[-1])
else:
    print(raw)
PY
          }

          init_payload=$(mktemp)
          extract_payload "$init_body" > "$init_payload"

          python3 - "$init_headers" "$init_body" <<'PY'
          import json
          import sys
          from pathlib import Path

          headers_path, body_path = sys.argv[1], sys.argv[2]
          status = Path(headers_path).read_text().splitlines()[0]
          if "200" not in status:
              raise SystemExit(f"initialize failed: {status}")
          raw = Path(body_path).read_text().strip()
          if raw.startswith("event:"):
              data_lines = [line.removeprefix("data: ").strip() for line in raw.splitlines() if line.startswith("data: ")]
              raw = data_lines[-1]
          data = json.loads(raw)
          if "error" in data:
              raise SystemExit(f"initialize error: {data['error']}")
          if "result" not in data:
              raise SystemExit("initialize missing result")
          PY

          session_id=$(awk -F': ' 'tolower($1)=="mcp-session-id" {gsub("\r", "", $2); print $2}' "$init_headers" | tail -n1)
          session_headers=()
          if [ -n "$session_id" ]; then
            session_headers=(-H "mcp-session-id: $session_id")
          fi

          list_body=$(mktemp)
          curl -sS -o "$list_body" \
            -H "Authorization: Bearer ${MCP_CI_SMOKE_TOKEN}" \
            -H 'content-type: application/json' \
            -H 'accept: application/json, text/event-stream' \
            "${session_headers[@]}" \
            --data '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}' \
            "$MCP_URL"

          list_payload=$(mktemp)
          extract_payload "$list_body" > "$list_payload"

          python3 - "$list_payload" <<'PY'
          import json
          import sys
          from pathlib import Path

          data = json.loads(Path(sys.argv[1]).read_text())
          if "error" in data:
              raise SystemExit(f"tools/list error: {data['error']}")
          tools = data.get("result", {}).get("tools", [])
          if not tools:
              raise SystemExit("tools/list returned no tools")
          PY

          call_body=$(mktemp)
          curl -sS -o "$call_body" \
            -H "Authorization: Bearer ${MCP_CI_SMOKE_TOKEN}" \
            -H 'content-type: application/json' \
            -H 'accept: application/json, text/event-stream' \
            "${session_headers[@]}" \
            --data '{"jsonrpc":"2.0","id":3,"method":"tools/call","params":{"name":"get_safety_stats","arguments":{}}}' \
            "$MCP_URL"

          call_payload=$(mktemp)
          extract_payload "$call_body" > "$call_payload"

          python3 - "$call_payload" <<'PY'
          import json
          import sys
          from pathlib import Path

          data = json.loads(Path(sys.argv[1]).read_text())
          if "error" in data:
              raise SystemExit(f"tools/call error: {data['error']}")
          result = data.get("result")
          if result is None:
              raise SystemExit("tools/call missing result")
          if result.get("isError") is True:
              raise SystemExit(f"tools/call isError=true: {result}")
          PY
